<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>文案生成 - AI助手</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#c0c1ff",
                        secondary: "#4cd7f6",
                        tertiary: "#ffdcc5",
                        surface: "#131317",
                        "surface-container": "#1f1f27",
                        "on-surface": "#e4e1ed",
                        "on-surface-variant": "#c7c4d7",
                        "on-primary": "#1000a9",
                        "on-secondary": "#001f26",
                        "background": "#13131b",
                    },
                    fontFamily: {
                        sans: ["Geist", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                },
            },
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Geist', sans-serif; 
            background: #13131b; 
            color: #e4e1ed;
            min-height: 100vh;
        }
        
        #p5-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .glass-card {
            background: rgba(31, 31, 39, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .input-area {
            background: rgba(19, 19, 27, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .input-area:focus {
            border-color: rgba(76, 215, 246, 0.5);
            box-shadow: 0 0 20px rgba(76, 215, 246, 0.2);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4cd7f6 0%, #3bc4e0 100%);
            color: #001f26;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(76, 215, 246, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: rgba(76, 215, 246, 0.5);
            background: rgba(76, 215, 246, 0.1);
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .result-card {
            background: rgba(19, 19, 27, 0.9);
            border: 1px solid rgba(76, 215, 246, 0.2);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        
        .style-tag {
            transition: all 0.3s ease;
        }
        
        .style-tag.selected {
            background: rgba(76, 215, 246, 0.2);
            border-color: #4cd7f6;
            color: #4cd7f6;
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #c0c1ff 0%, #4cd7f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="relative">
    <canvas id="p5-canvas"></canvas>
    
    <!-- Navigation -->
    <header class="fixed top-0 w-full z-50 glass-card border-b border-white/5">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl text-on-primary">auto_awesome</span>
                </div>
                <span class="text-xl font-bold text-on-surface">AI助手</span>
            </a>
            
            <div class="flex items-center gap-6">
                <a href="/" class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined text-lg">home</span>
                    <span>返回首页</span>
                </a>
            </div>
        </nav>
    </header>
    
    <main class="relative z-10 pt-24 pb-16 px-6 min-h-screen">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-secondary/20 text-secondary mb-6">
                    <span class="material-symbols-outlined text-3xl">edit_note</span>
                </div>
                <h1 class="text-4xl font-bold mb-4">文案生成</h1>
                <p class="text-on-surface-variant text-lg max-w-xl mx-auto">
                    描述场景或产品，一键生成多种风格的专业文案
                </p>
            </div>
            
            <!-- Input Section -->
            <div class="glass-card rounded-2xl p-8 mb-8">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-on-surface mb-3">场景描述</label>
                    <textarea 
                        id="scene-input"
                        class="input-area w-full h-32 rounded-xl p-4 text-on-surface placeholder-on-surface-variant resize-none"
                        placeholder="描述你的场景或产品，例如：一款面向年轻人的运动饮料，主打提神抗疲劳..."
                    ></textarea>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-on-surface mb-3">文案风格</label>
                    <div class="flex flex-wrap gap-3">
                        <button type="button" class="style-tag px-4 py-2 rounded-lg border border-outline-variant text-on-surface-variant text-sm" data-style="简洁有力" onclick="selectStyle(this)">简洁有力</button>
                        <button type="button" class="style-tag px-4 py-2 rounded-lg border border-outline-variant text-on-surface-variant text-sm" data-style="温暖亲和" onclick="selectStyle(this)">温暖亲和</button>
                        <button type="button" class="style-tag px-4 py-2 rounded-lg border border-outline-variant text-on-surface-variant text-sm" data-style="专业严谨" onclick="selectStyle(this)">专业严谨</button>
                        <button type="button" class="style-tag px-4 py-2 rounded-lg border border-outline-variant text-on-surface-variant text-sm" data-style="活泼有趣" onclick="selectStyle(this)">活泼有趣</button>
                        <button type="button" class="style-tag px-4 py-2 rounded-lg border border-outline-variant text-on-surface-variant text-sm" data-style="高端奢华" onclick="selectStyle(this)">高端奢华</button>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label class="block text-sm font-medium text-on-surface mb-3">生成数量</label>
                    <select id="count-select" class="input-area px-4 py-3 rounded-xl text-on-surface">
                        <option value="3">3条</option>
                        <option value="5">5条</option>
                        <option value="8">8条</option>
                    </select>
                </div>
                
                <div class="flex flex-wrap gap-4">
                    <button 
                        id="generate-btn"
                        onclick="generateCopywriting()"
                        class="btn-primary px-8 py-3 rounded-xl font-semibold flex items-center gap-2"
                    >
                        <span class="material-symbols-outlined">auto_awesome</span>
                        生成文案
                    </button>
                    <button 
                        onclick="clearInput()"
                        class="btn-secondary px-8 py-3 rounded-xl font-semibold text-on-surface"
                    >
                        清空内容
                    </button>
                </div>
            </div>
            
            <!-- Loading State -->
            <div id="loading-state" class="hidden glass-card rounded-2xl p-8 mb-8">
                <div class="flex items-center justify-center gap-4">
                    <div class="w-10 h-10 rounded-full border-2 border-secondary border-t-transparent loading-spinner"></div>
                    <span class="text-on-surface-variant">AI正在为你生成精彩文案...</span>
                </div>
            </div>
            
            <!-- Result Section -->
            <div id="result-section" class="hidden">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-secondary">check_circle</span>
                    <h2 class="text-xl font-bold text-on-surface">生成结果</h2>
                </div>
                
                <div id="result-list" class="space-y-4">
                    <!-- Results will be inserted here -->
                </div>
                
                <div class="flex flex-wrap gap-4 mt-6">
                    <button onclick="copyAllResults()" class="btn-secondary px-6 py-3 rounded-xl font-semibold text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined">content_copy</span>
                        复制全部
                    </button>
                    <button onclick="generateCopywriting()" class="btn-primary px-6 py-3 rounded-xl font-semibold flex items-center gap-2">
                        <span class="material-symbols-outlined">refresh</span>
                        重新生成
                    </button>
                </div>
            </div>
            
            <!-- Error State -->
            <div id="error-state" class="hidden glass-card rounded-2xl p-8 border-red-500/30">
                <div class="flex items-center gap-4 text-red-400">
                    <span class="material-symbols-outlined text-2xl">error</span>
                    <div>
                        <p class="font-semibold">出错了</p>
                        <p id="error-message" class="text-sm text-red-400/80 mt-1"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="relative z-10 border-t border-white/5 py-8">
        <div class="text-center text-on-surface-variant text-sm">
            <p>© 2024 AI助手 - 文案生成工具</p>
        </div>
    </footer>
    
    <script>
        let selectedStyle = '';
        
        // p5.js Particle System
        let particles = [];
        const particleCount = 40;
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = random(width);
                this.y = random(height);
                this.size = random(1, 2.5);
                this.speedX = random(-0.2, 0.2);
                this.speedY = random(-0.2, 0.2);
                this.opacity = random(80, 150);
                this.color = random(['#c0c1ff', '#4cd7f6']);
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            
            draw() {
                noStroke();
                fill(this.color + hex(floor(this.opacity), 2));
                circle(this.x, this.y, this.size);
            }
        }
        
        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('p5-canvas');
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        function draw() {
            clear();
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                    if (d < 120) {
                        stroke(76, 215, 246, map(d, 0, 120, 30, 0));
                        strokeWeight(0.5);
                        line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                    }
                }
            }
            particles.forEach(p => { p.update(); p.draw(); });
        }
        
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
        
        function selectStyle(btn) {
            document.querySelectorAll('.style-tag').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedStyle = btn.dataset.style;
        }
        
        async function generateCopywriting() {
            const scene = document.getElementById('scene-input').value.trim();
            const count = document.getElementById('count-select').value;
            
            if (!scene) {
                showError('请输入场景描述');
                return;
            }
            
            hideError();
            hideResult();
            showLoading();
            
            try {
                const response = await fetch('/api/copywriting/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        scene: scene,
                        style: selectedStyle || '默认风格',
                        count: parseInt(count)
                    }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    let results = data.result || data.copywriting || data.results || [];
                    if (typeof results === 'string') {
                        results = [results];
                    }
                    showResults(results);
                } else {
                    showError(data.error || '生成失败，请稍后重试');
                }
            } catch (error) {
                showError('网络错误，请检查后端服务是否运行在 localhost:5001');
            } finally {
                hideLoading();
            }
        }
        
        function clearInput() {
            document.getElementById('scene-input').value = '';
            document.querySelectorAll('.style-tag').forEach(b => b.classList.remove('selected'));
            selectedStyle = '';
            hideResult();
            hideError();
        }
        
        function showLoading() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('generate-btn').disabled = true;
        }
        
        function hideLoading() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('generate-btn').disabled = false;
        }
        
        function showResults(results) {
            const container = document.getElementById('result-list');
            container.innerHTML = '';
            
            results.forEach((content, index) => {
                const card = document.createElement('div');
                card.className = 'result-card rounded-xl p-6';
                card.innerHTML = `
                    <div class="flex items-start gap-4">
                        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-secondary/20 text-secondary flex items-center justify-center text-sm font-bold">${index + 1}</span>
                        <div class="flex-grow">
                            <p class="text-on-surface leading-relaxed">${content}</p>
                            <button onclick="copyText('${content.replace(/'/g, "\\'").replace(/\n/g, '\\n')}')" class="mt-3 text-secondary text-sm flex items-center gap-1 hover:underline">
                                <span class="material-symbols-outlined text-base">content_copy</span>
                                复制
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            document.getElementById('result-section').classList.remove('hidden');
        }
        
        function hideResult() {
            document.getElementById('result-section').classList.add('hidden');
        }
        
        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-state').classList.remove('hidden');
        }
        
        function hideError() {
            document.getElementById('error-state').classList.add('hidden');
        }
        
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            });
        }
        
        function copyAllResults() {
            const results = document.querySelectorAll('#result-list p');
            const text = Array.from(results).map((p, i) => `【文案${i + 1}】\n${p.textContent}`).join('\n\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制全部文案到剪贴板');
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>翻译助手 - AI助手</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Geist:wght@400;600;700&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#c0c1ff",
                        secondary: "#4cd7f6",
                        tertiary: "#ffdcc5",
                        surface: "#131317",
                        "surface-container": "#1f1f27",
                        "on-surface": "#e4e1ed",
                        "on-surface-variant": "#c7c4d7",
                        "on-tertiary": "#4f2500",
                        "background": "#13131b",
                    },
                    fontFamily: {
                        sans: ["Geist", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"],
                    },
                },
            },
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Geist', sans-serif; 
            background: #13131b; 
            color: #e4e1ed;
            min-height: 100vh;
        }
        
        #p5-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .glass-card {
            background: rgba(31, 31, 39, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .input-area {
            background: rgba(19, 19, 27, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .input-area:focus {
            border-color: rgba(255, 220, 197, 0.5);
            box-shadow: 0 0 20px rgba(255, 220, 197, 0.2);
            outline: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ffdcc5 0%, #ffb783 100%);
            color: #4f2500;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 220, 197, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            border-color: rgba(255, 220, 197, 0.5);
            background: rgba(255, 220, 197, 0.1);
        }
        
        .btn-tertiary {
            background: rgba(255, 220, 197, 0.1);
            border: 1px solid rgba(255, 220, 197, 0.3);
            color: #ffdcc5;
            transition: all 0.3s ease;
        }
        
        .btn-tertiary:hover {
            background: rgba(255, 220, 197, 0.2);
            border-color: #ffdcc5;
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .result-card {
            background: rgba(19, 19, 27, 0.9);
            border: 1px solid rgba(255, 220, 197, 0.2);
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #c0c1ff 0%, #ffdcc5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .swap-icon {
            transition: transform 0.3s ease;
        }
        
        .swap-icon:hover {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="relative">
    <canvas id="p5-canvas"></canvas>
    
    <!-- Navigation -->
    <header class="fixed top-0 w-full z-50 glass-card border-b border-white/5">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                    <span class="material-symbols-outlined text-xl text-on-primary">auto_awesome</span>
                </div>
                <span class="text-xl font-bold text-on-surface">AI助手</span>
            </a>
            
            <div class="flex items-center gap-4">
                <a href="/" class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
                    <span class="material-symbols-outlined text-lg">home</span>
                    <span>返回首页</span>
                </a>

                <span id="api-status-badge" class="hidden md:inline-flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium bg-yellow-500/10 border border-yellow-500/30 text-yellow-400" title="当前为模拟返回">
                    <span class="w-2 h-2 rounded-full bg-yellow-400"></span>
                    <span id="api-status-text">未配置</span>
                </span>

                <button onclick="openSettings()" class="btn-secondary px-4 py-2 rounded-full text-sm font-medium text-on-surface flex items-center gap-2" title="配置 AI 模型与 API Key">
                    <span class="material-symbols-outlined text-base">settings</span>
                </button>
            </div>
        </nav>
    </header>
    
    <main class="relative z-10 pt-24 pb-16 px-6 min-h-screen">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-tertiary/20 text-tertiary mb-6">
                    <span class="material-symbols-outlined text-3xl">translate</span>
                </div>
                <h1 class="text-4xl font-bold mb-4">翻译助手</h1>
                <p class="text-on-surface-variant text-lg max-w-xl mx-auto">
                    中英互译 + 智能润色，让翻译不再生硬，更符合母语表达习惯
                </p>
            </div>
            
            <!-- Input Section -->
            <div class="glass-card rounded-2xl p-8 mb-8">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-on-surface mb-3">输入文本</label>
                    <textarea
                        id="input-text"
                        class="input-area w-full h-40 rounded-xl p-4 text-on-surface placeholder-on-surface-variant resize-none"
                        placeholder="输入要翻译的文本..."
                    ></textarea>
                </div>

                <!-- 文件上传区 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-on-surface mb-3">或上传文件（PDF / Word / TXT）</label>
                    <div id="translate-dropzone" class="border-2 border-dashed border-outline-variant rounded-xl p-4 text-center cursor-pointer hover:border-tertiary transition-colors">
                        <input type="file" id="translate-file" class="hidden" accept=".pdf,.docx,.doc,.txt">
                        <div id="translate-upload-default">
                            <span class="material-symbols-outlined text-2xl text-on-surface-variant">upload_file</span>
                            <p class="text-on-surface-variant text-sm">点击上传</p>
                        </div>
                        <div id="translate-upload-success" class="hidden">
                            <span class="material-symbols-outlined text-2xl text-emerald-400">check_circle</span>
                            <p id="translate-filename" class="text-on-surface text-sm font-medium"></p>
                        </div>
                    </div>
                </div>

                <!-- 目标语言选择 -->
                <div class="mb-4">
                    <label class="block text-sm font-medium text-on-surface mb-2">目标语言</label>
                    <select id="target-lang" class="input-area w-full md:w-64 px-4 py-2 rounded-xl text-on-surface">
                        <option value="English">英语</option>
                        <option value="中文">中文</option>
                        <option value="日本語">日语</option>
                        <option value="한국어">韩语</option>
                        <option value="Français">法语</option>
                        <option value="Deutsch">德语</option>
                        <option value="Español">西班牙语</option>
                    </select>
                </div>

                <div class="flex flex-wrap gap-4">
                    <button
                        id="translate-btn"
                        onclick="translateText()"
                        class="btn-primary px-8 py-3 rounded-xl font-semibold flex items-center gap-2"
                    >
                        <span class="material-symbols-outlined">translate</span>
                        翻译
                    </button>
                    <button
                        id="polish-btn"
                        onclick="polishText()"
                        class="btn-tertiary px-8 py-3 rounded-xl font-semibold flex items-center gap-2"
                    >
                        <span class="material-symbols-outlined">auto_fix_high</span>
                        润色
                    </button>
                    <button
                        onclick="clearInput()"
                        class="btn-secondary px-8 py-3 rounded-xl font-semibold text-on-surface"
                    >
                        清空
                    </button>
                </div>
            </div>
            
            <!-- Loading State -->
            <div id="loading-state" class="hidden glass-card rounded-2xl p-8 mb-8">
                <div class="flex items-center justify-center gap-4">
                    <div class="w-10 h-10 rounded-full border-2 border-tertiary border-t-transparent loading-spinner"></div>
                    <span class="text-on-surface-variant">AI正在翻译/润色中...</span>
                </div>
            </div>
            
            <!-- Result Section -->
            <div id="result-section" class="hidden">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-tertiary">check_circle</span>
                    <h2 class="text-xl font-bold text-on-surface">翻译结果</h2>
                </div>

                <div class="result-card rounded-2xl p-6 md:p-8">
                    <div id="result-content" class="text-on-surface leading-relaxed"></div>
                </div>

                <div class="flex flex-wrap gap-3 mt-6">
                    <button onclick="copyResult()" class="btn-secondary px-5 py-3 rounded-xl font-medium text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined">content_copy</span>
                        复制
                    </button>
                    <button onclick="exportResult('docx')" class="btn-secondary px-5 py-3 rounded-xl font-medium text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined">description</span>
                        导出 Word
                    </button>
                    <button onclick="exportResult('pdf')" class="btn-secondary px-5 py-3 rounded-xl font-medium text-on-surface flex items-center gap-2">
                        <span class="material-symbols-outlined">picture_as_pdf</span>
                        导出 PDF
                    </button>
                    <button onclick="swapInputResult()" class="btn-tertiary px-5 py-3 rounded-xl font-medium flex items-center gap-2">
                        <span class="material-symbols-outlined">swap_horiz</span>
                        结果作为输入
                    </button>
                </div>

                <div id="export-preview" class="hidden mt-6">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-lg font-semibold text-on-surface flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary">preview</span>
                            文档预览
                        </h3>
                        <a id="export-download-link" href="#" download class="btn-primary px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1">
                            <span class="material-symbols-outlined text-base">download</span>
                            下载
                        </a>
                    </div>
                    <div class="result-card rounded-2xl p-4">
                        <iframe id="export-iframe" class="w-full rounded-lg" style="height: 600px; background: white;"></iframe>
                    </div>
                </div>
            </div>
            
            <!-- Error State -->
            <div id="error-state" class="hidden glass-card rounded-2xl p-8 border-red-500/30">
                <div class="flex items-center gap-4 text-red-400">
                    <span class="material-symbols-outlined text-2xl">error</span>
                    <div>
                        <p class="font-semibold">出错了</p>
                        <p id="error-message" class="text-sm text-red-400/80 mt-1"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="relative z-10 border-t border-white/5 py-8">
        <div class="text-center text-on-surface-variant text-sm">
            <p>© 2024 AI助手 - 翻译助手工具</p>
        </div>
    </footer>

    {% include "_settings_modal.html" %}

    <script src="/static/js/utils.js"></script>
    <script>
        // p5.js Particle System
        let particles = [];
        const particleCount = 40;

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = random(width);
                this.y = random(height);
                this.size = random(1, 2.5);
                this.speedX = random(-0.2, 0.2);
                this.speedY = random(-0.2, 0.2);
                this.opacity = random(80, 150);
                this.color = random(['#ffdcc5', '#ffb783']);
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            draw() {
                noStroke();
                fill(this.color + hex(floor(this.opacity), 2));
                circle(this.x, this.y, this.size);
            }
        }

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('p5-canvas');
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            clear();
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                    if (d < 120) {
                        stroke(255, 220, 197, map(d, 0, 120, 30, 0));
                        strokeWeight(0.5);
                        line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                    }
                }
            }
            particles.forEach(p => { p.update(); p.draw(); });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        let selectedFile = null;
        let currentResultText = '';
        let currentExportText = '';  // 用于导出的翻译内容
        const TOOL_NAME = 'translate';

        function handleFileSelect(file) {
            const allowed = ['.pdf', '.docx', '.doc', '.txt'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            if (!allowed.includes(ext)) {
                showError('不支持的文件格式：' + ext);
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showError('文件超过 10MB 限制');
                return;
            }
            selectedFile = file;
            showUploadSuccess('translate-upload-default', 'translate-upload-success', 'translate-filename', file.name);
            hideError();
        }

        function clearTranslateFile() {
            selectedFile = null;
            document.getElementById('translate-file').value = '';
            clearUpload('translate-upload-default', 'translate-upload-success');
        }

        async function translateText() {
            const text = document.getElementById('input-text').value.trim();
            const targetLang = document.getElementById('target-lang').value;

            if (!text && !selectedFile) {
                showError('请输入文本或上传文件');
                return;
            }

            hideError();
            hideResult();
            hideExportPreview();
            showLoading('翻译');

            try {
                let response, data;
                if (selectedFile) {
                    const formData = new FormData();
                    formData.append('file', selectedFile);
                    formData.append('target_lang', targetLang);
                    response = await fetch('/api/translate/translate', { method: 'POST', body: formData });
                } else {
                    response = await fetch('/api/translate/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text, target_lang: targetLang }),
                    });
                }
                data = await response.json();
                if (response.ok) {
                    currentResultText = data.result || data.translation || data.text || '';
                    currentExportText = data.optimized_text || currentResultText;
                    showResult(currentResultText);
                    saveHistory({
                        tool: TOOL_NAME,
                        title: '翻译→' + targetLang + ' - ' + new Date().toLocaleString('zh-CN'),
                        input_text: data.source || text,
                        output_text: currentResultText,
                        meta: { target_lang: targetLang, source: selectedFile ? 'file' : 'text' },
                    });
                } else {
                    showError(data.error || '翻译失败，请稍后重试');
                }
            } catch (error) {
                showError('网络错误，请检查后端服务是否运行在 localhost:5001');
            } finally {
                hideLoading();
            }
        }

        async function polishText() {
            const text = document.getElementById('input-text').value.trim();
            if (!text) { showError('请输入要润色的文本'); return; }
            hideError(); hideResult(); hideExportPreview();
            showLoading('润色');
            try {
                const response = await fetch('/api/translate/polish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text }),
                });
                const data = await response.json();
                if (response.ok) {
                    currentResultText = data.result || data.polished || data.text || '';
                    currentExportText = data.optimized_text || currentResultText;
                    showResult(currentResultText);
                    saveHistory({
                        tool: TOOL_NAME,
                        title: '润色 - ' + new Date().toLocaleString('zh-CN'),
                        input_text: text,
                        output_text: currentResultText,
                        meta: { action: 'polish' },
                    });
                } else {
                    showError(data.error || '润色失败');
                }
            } catch (e) { showError('网络错误，请检查后端服务是否运行在 localhost:5001'); }
            finally { hideLoading(); }
        }

        function clearInput() {
            document.getElementById('input-text').value = '';
            clearTranslateFile();
            hideResult();
            hideExportPreview();
            hideError();
        }

        function showLoading(action) {
            document.getElementById('loading-state').querySelector('span').textContent = `AI正在${action}中...`;
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('translate-btn').disabled = true;
            document.getElementById('polish-btn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('translate-btn').disabled = false;
            document.getElementById('polish-btn').disabled = false;
        }

        function showResult(content) {
            document.getElementById('result-content').innerHTML = renderMarkdown(content);
            document.getElementById('result-section').classList.remove('hidden');
        }

        function hideResult() {
            document.getElementById('result-section').classList.add('hidden');
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-state').classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-state').classList.add('hidden');
        }

        function copyResult() {
            if (currentResultText) copyText(currentResultText);
        }

        async function exportResult(format) {
            await exportAndPreview(format, currentExportText, '翻译文档', 'export-preview', 'clean');
        }

        function swapInputResult() {
            document.getElementById('input-text').value = currentResultText;
            hideResult();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initFileUpload({
                dropzoneId: 'translate-dropzone',
                fileInputId: 'translate-file',
                defaultId: 'translate-upload-default',
                successId: 'translate-upload-success',
                filenameId: 'translate-filename',
                onSelect: handleFileSelect,
            });
            initHistorySidebar(TOOL_NAME);
        });
    </script>

    {% include "_history_sidebar.html" %}
</body>
</html>
